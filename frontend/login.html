<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - SmartQueue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:["Inter","sans-serif"],outfit:["Outfit","sans-serif"]}}}}</script>
    <style>
        *,*::before,*::after{box-sizing:border-box;}
        body{background:#0a0a12;color:rgba(255,255,255,0.92);font-family:"Inter",-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
        .bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
        .orb{position:absolute;border-radius:50%;filter:blur(80px);animation:float 14s ease-in-out infinite;will-change:transform;}
        .orb-1{width:55vw;height:55vw;top:-15%;left:-10%;background:radial-gradient(circle,rgba(99,102,241,0.35)0%,transparent 70%);animation-duration:14s;}
        .orb-2{width:45vw;height:45vw;bottom:-10%;right:-10%;background:radial-gradient(circle,rgba(168,85,247,0.28)0%,transparent 70%);animation-duration:18s;animation-delay:-5s;}
        .orb-3{width:35vw;height:35vw;top:40%;left:55%;background:radial-gradient(circle,rgba(14,165,233,0.22)0%,transparent 70%);animation-duration:22s;animation-delay:-9s;}
        @keyframes float{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(3%,4%) scale(1.06);}66%{transform:translate(-2%,-3%) scale(0.95);}}
        .glass-panel{background:rgba(255,255,255,0.07);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border:1px solid rgba(255,255,255,0.18);box-shadow:0 8px 32px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.15);position:relative;}
        .glass-panel::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,0.12)0%,rgba(255,255,255,0)50%,rgba(255,255,255,0.04)100%);pointer-events:none;}
        .glass-input{background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.92);transition:all 0.2s ease;width:100%;}
        .glass-input:focus{outline:none;border-color:rgba(129,140,248,0.6);box-shadow:0 0 0 3px rgba(129,140,248,0.15);background:rgba(255,255,255,0.09);}
        .glass-input::placeholder{color:rgba(255,255,255,0.3);}
        .glass-btn{background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.16);box-shadow:0 4px 16px rgba(0,0,0,0.25),inset 0 1px 0 rgba(255,255,255,0.12);transition:all 0.2s ease;color:rgba(255,255,255,0.85);}
        .gradient-text{background:linear-gradient(135deg,#818cf8,#c084fc,#fb7185);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between relative overflow-x-hidden">
    <div class="bg-mesh">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <header class="max-w-7xl mx-auto px-6 w-full h-20 flex items-center justify-between z-10 relative">
        <a href="index.html" class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-2xl flex items-center justify-center" style="background:linear-gradient(135deg,#6366f1,#a855f7);box-shadow:0 4px 20px rgba(99,102,241,0.45),inset 0 1px 0 rgba(255,255,255,0.3);">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <span class="font-outfit font-bold text-xl tracking-wide gradient-text">SmartQueue</span>
        </a>
        <button id="api-config-btn" title="Configure Backend URL" class="glass-btn p-2.5 rounded-xl">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
        </button>
    </header>

    <main class="flex-grow flex items-center justify-center px-6 py-12 z-10 relative">
        <div class="max-w-md w-full glass-panel rounded-3xl p-8 md:p-10 overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-[2px]" style="background:linear-gradient(90deg,#6366f1,#a855f7,#ec4899);"></div>
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-3xl flex items-center justify-center mx-auto mb-4" style="background:linear-gradient(135deg,#6366f1,#a855f7);box-shadow:0 8px 24px rgba(99,102,241,0.4),inset 0 1px 0 rgba(255,255,255,0.3);">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <h1 class="font-outfit font-extrabold text-3xl mb-2">Welcome Back</h1>
                <p class="text-sm" style="color:rgba(255,255,255,0.5);">Sign in to manage your shop's active queues.</p>
            </div>
            <form id="login-form" class="space-y-5">
                <div>
                    <label for="phone" class="block text-xs font-semibold uppercase tracking-wider mb-2" style="color:rgba(255,255,255,0.45);">Phone Number</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4" style="color:rgba(255,255,255,0.35);">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        </span>
                        <input type="tel" id="phone" required placeholder="e.g. +1 234 567 890" class="glass-input rounded-xl pl-12 pr-4 py-3.5 text-sm font-medium"/>
                    </div>
                </div>
                <div>
                    <label for="password" class="block text-xs font-semibold uppercase tracking-wider mb-2" style="color:rgba(255,255,255,0.45);">Password</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4" style="color:rgba(255,255,255,0.35);">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        </span>
                        <input type="password" id="password" required placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" class="glass-input rounded-xl pl-12 pr-4 py-3.5 text-sm font-medium"/>
                    </div>
                </div>
                <button type="submit" id="submit-btn" class="w-full font-bold py-4 rounded-xl text-white text-sm tracking-wide" style="background:linear-gradient(135deg,#6366f1,#a855f7,#ec4899);box-shadow:0 4px 24px rgba(99,102,241,0.35),inset 0 1px 0 rgba(255,255,255,0.25);transition:opacity 0.2s;">
                    Sign In to Dashboard
                </button>
            </form>
            <div class="mt-7 text-center pt-6 text-sm" style="border-top:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.45);">
                Don't have an account? <a href="register.html" class="font-semibold ml-1" style="color:#818cf8;">Register here</a>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center z-10 relative" style="border-top:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.25);font-size:0.75rem;">
        <p>&copy; 2026 SmartQueue. All rights reserved.</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        if (Auth.isAuthenticated()) window.location.href = "dashboard.html";
        const loginForm = document.getElementById("login-form");
        const submitBtn = document.getElementById("submit-btn");
        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const phone = document.getElementById("phone").value.trim();
            const password = document.getElementById("password").value;
            if (!phone || !password) { Toast.show("Please fill in all fields", "error"); return; }
            submitBtn.disabled = true;
            submitBtn.innerHTML = "<svg class='animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block' fill='none' viewBox='0 0 24 24'><circle class='opacity-25' cx='12' cy='12' r='10' stroke='currentColor' stroke-width='4'></circle><path class='opacity-75' fill='currentColor' d='M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z'></path></svg>Processing...";
            try {
                const response = await fetch(CONFIG.API_BASE_URL + "/auth/login", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ phone, password }) });
                const result = await response.json();
                if (!response.ok) throw new Error(result.message || "Login failed");
                Auth.setToken(result.token); Auth.setShop(result.shop);
                Toast.show("Login successful! Redirecting...", "success");
                setTimeout(() => { window.location.href = "dashboard.html"; }, 1000);
            } catch (error) { Toast.show(error.message, "error"); submitBtn.disabled = false; submitBtn.innerText = "Sign In to Dashboard"; }
        });
    </script>
</body>
</html>
