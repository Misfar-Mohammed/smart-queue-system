<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Registration - Smart Queue System</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts Outfit & Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex flex-col justify-between relative overflow-x-hidden">

    <!-- Ambient Gradients -->
    <div class="absolute top-[-20%] left-[-20%] w-[60%] h-[60%] rounded-full bg-indigo-900/20 blur-[150px] pointer-events-none"></div>
    <div class="absolute bottom-[-20%] right-[-20%] w-[60%] h-[60%] rounded-full bg-violet-900/20 blur-[150px] pointer-events-none"></div>

    <!-- Header Navigation -->
    <header class="max-w-7xl mx-auto px-6 w-full h-20 flex items-center justify-between z-10 relative">
        <a href="index.html" class="flex items-center gap-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-500 to-violet-500 flex items-center justify-center shadow-lg shadow-indigo-500/30">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <span class="font-outfit font-bold text-xl tracking-wide bg-gradient-to-r from-indigo-400 via-violet-400 to-pink-400 bg-clip-text text-transparent">SmartQueue</span>
        </a>
        <button id="api-config-btn" title="Configure Backend URL" class="p-2.5 rounded-xl border border-slate-800 text-slate-400 hover:text-white hover:border-slate-700 transition-all">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
            </svg>
        </button>
    </header>

    <!-- Main Section -->
    <main class="flex-grow flex items-center justify-center px-6 py-12 z-10 relative">
        <div class="max-w-md w-full glass-panel rounded-2xl p-8 relative">
            <div class="absolute top-0 left-0 w-full h-[3px] bg-gradient-to-r from-indigo-500 via-violet-500 to-pink-500"></div>
            
            <div class="text-center mb-6">
                <h1 class="font-outfit font-extrabold text-3xl text-white mb-2">Register Shop</h1>
                <p class="text-slate-400 text-sm">Join the SaaS network and launch your live customer queue.</p>
            </div>

            <form id="register-form" class="space-y-4">
                <!-- Shop Name Field -->
                <div>
                    <label for="shop_name" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Shop Name</label>
                    <input type="text" id="shop_name" required placeholder="e.g. Starbucks Downtown" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-slate-100 text-sm focus:outline-none focus:border-indigo-500 transition-all font-medium"/>
                </div>

                <!-- Owner Name Field -->
                <div>
                    <label for="owner_name" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Owner Name</label>
                    <input type="text" id="owner_name" required placeholder="e.g. John Doe" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-slate-100 text-sm focus:outline-none focus:border-indigo-500 transition-all font-medium"/>
                </div>

                <!-- Phone Field -->
                <div>
                    <label for="phone" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Phone Number</label>
                    <input type="tel" id="phone" required placeholder="e.g. +1 234 567 890" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-slate-100 text-sm focus:outline-none focus:border-indigo-500 transition-all font-medium"/>
                </div>

                <!-- Password Field -->
                <div>
                    <label for="password" class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Password</label>
                    <input type="password" id="password" required placeholder="Min 6 characters" class="w-full bg-slate-900 border border-slate-800 rounded-xl px-4 py-3 text-slate-100 text-sm focus:outline-none focus:border-indigo-500 transition-all font-medium"/>
                </div>

                <!-- Submit Button -->
                <button type="submit" id="submit-btn" class="w-full bg-gradient-to-r from-indigo-500 via-violet-500 to-pink-500 hover:opacity-95 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-indigo-500/20 text-sm tracking-wide mt-2">
                    Create Account & Log In
                </button>
            </form>

            <div class="mt-6 text-center border-t border-slate-900 pt-4 text-sm text-slate-400">
                Already registered? 
                <a href="login.html" class="text-indigo-400 hover:text-indigo-300 font-semibold transition-colors">Sign In</a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-8 text-center text-slate-500 text-xs border-t border-slate-900/50">
        <p>&copy; 2026 SmartQueue. All rights reserved.</p>
    </footer>

    <!-- App Scripts -->
    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Redirect if already authenticated
        if (Auth.isAuthenticated()) {
            window.location.href = 'dashboard.html';
        }

        const registerForm = document.getElementById('register-form');
        const submitBtn = document.getElementById('submit-btn');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const shop_name = document.getElementById('shop_name').value.trim();
            const owner_name = document.getElementById('owner_name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;

            // Form Validation
            if (!shop_name || !owner_name || !phone || !password) {
                Toast.show('Please fill in all fields', 'error');
                return;
            }

            if (password.length < 6) {
                Toast.show('Password must be at least 6 characters', 'error');
                return;
            }

            // Set Loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Processing...
            `;

            try {
                const response = await fetch(`${CONFIG.API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ shop_name, owner_name, phone, password })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.message || 'Registration failed');
                }

                // Save token and shop data
                Auth.setToken(result.token);
                Auth.setShop(result.shop);

                Toast.show('Registration successful! Launching dashboard...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1000);

            } catch (error) {
                Toast.show(error.message, 'error');
                // Reset submit button state
                submitBtn.disabled = false;
                submitBtn.innerText = 'Create Account & Log In';
            }
        });
    </script>
</body>
</html>
