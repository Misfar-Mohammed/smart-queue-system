<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Queue - SmartQueue</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>tailwind.config={theme:{extend:{fontFamily:{sans:["Inter","sans-serif"],outfit:["Outfit","sans-serif"]}}}}</script>
    <style>
        *,*::before,*::after{box-sizing:border-box;}
        body{background:#0a0a12;color:rgba(255,255,255,0.92);font-family:"Inter",-apple-system,sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden;}
        .bg-mesh{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
        .orb{position:absolute;border-radius:50%;filter:blur(80px);animation:float 14s ease-in-out infinite;will-change:transform;}
        .orb-1{width:55vw;height:55vw;top:-15%;left:-10%;background:radial-gradient(circle,rgba(99,102,241,0.35)0%,transparent 70%);animation-duration:14s;}
        .orb-2{width:45vw;height:45vw;bottom:-10%;right:-10%;background:radial-gradient(circle,rgba(168,85,247,0.28)0%,transparent 70%);animation-duration:18s;animation-delay:-5s;}
        .orb-3{width:35vw;height:35vw;top:40%;left:55%;background:radial-gradient(circle,rgba(14,165,233,0.22)0%,transparent 70%);animation-duration:22s;animation-delay:-9s;}
        @keyframes float{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(3%,4%) scale(1.06);}66%{transform:translate(-2%,-3%) scale(0.95);}}
        .glass-panel{background:rgba(255,255,255,0.07);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border:1px solid rgba(255,255,255,0.18);box-shadow:0 8px 32px rgba(0,0,0,0.35),inset 0 1px 0 rgba(255,255,255,0.15);position:relative;}
        .glass-panel::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,0.12)0%,rgba(255,255,255,0)50%,rgba(255,255,255,0.04)100%);pointer-events:none;}
        .glass-input{background:rgba(255,255,255,0.06);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.14);color:rgba(255,255,255,0.92);transition:all 0.2s ease;width:100%;}
        .glass-input:focus{outline:none;border-color:rgba(129,140,248,0.6);box-shadow:0 0 0 3px rgba(129,140,248,0.15);background:rgba(255,255,255,0.09);}
        .glass-input::placeholder{color:rgba(255,255,255,0.3);}
        .gradient-text{background:linear-gradient(135deg,#818cf8,#c084fc,#fb7185);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
        .svc-card{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.13);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:1rem;padding:1rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:0.5rem;transition:all 0.25s ease;user-select:none;}
        .svc-card:hover{border-color:rgba(129,140,248,0.4);background:rgba(99,102,241,0.08);transform:translateY(-2px);}
        .svc-card.active{border-color:rgba(129,140,248,0.65);background:rgba(99,102,241,0.14);box-shadow:0 0 20px rgba(99,102,241,0.2);}
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between relative overflow-x-hidden">
    <div class="bg-mesh">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <header class="max-w-7xl mx-auto px-6 w-full h-20 flex items-center z-10 relative">
        <a href="index.html" class="flex items-center gap-3">
            <div class="w-11 h-11 rounded-2xl flex items-center justify-center" style="background:linear-gradient(135deg,#6366f1,#a855f7);box-shadow:0 4px 20px rgba(99,102,241,0.45),inset 0 1px 0 rgba(255,255,255,0.3);">
                <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <span class="font-outfit font-bold text-xl tracking-wide gradient-text">SmartQueue</span>
        </a>
    </header>

    <main class="flex-grow flex items-center justify-center px-6 py-12 z-10 relative">
        <div class="max-w-md w-full glass-panel rounded-3xl p-8 overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-[2px]" style="background:linear-gradient(90deg,#6366f1,#a855f7,#ec4899);"></div>

            <div id="shop-loader" class="text-center py-10">
                <svg class="animate-spin h-10 w-10 mx-auto mb-4" style="color:#818cf8;" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-sm font-semibold" style="color:rgba(255,255,255,0.5);">Connecting to shop...</p>
            </div>

            <div id="form-container" class="hidden">
                <div class="text-center mb-8 flex flex-col items-center justify-center">
                    <!-- Shop Avatar Section -->
                    <div id="shop-avatar-container" class="w-20 h-20 rounded-full border-2 border-indigo-500 bg-slate-900 flex items-center justify-center relative overflow-hidden mb-4 shadow-lg">
                        <img id="shop-avatar-img" class="w-full h-full object-cover hidden" alt="Shop Avatar"/>
                        <span id="shop-avatar-placeholder" class="text-xl font-bold font-outfit text-indigo-400 uppercase">-</span>
                    </div>
                    <span class="text-[10px] font-bold tracking-widest uppercase px-3 py-1.5 rounded-full" style="color:#818cf8;background:rgba(129,140,248,0.1);border:1px solid rgba(129,140,248,0.2);">You are joining:</span>
                    <h1 id="shop-name-title" class="font-outfit font-extrabold text-3xl mt-3 mb-1">Loading...</h1>
                    <p class="text-xs" style="color:rgba(255,255,255,0.45);">Fill in the fields to retrieve your queue ticket number.</p>
                </div>
                <form id="join-queue-form" class="space-y-5">
                    <div>
                        <label for="name" class="block text-xs font-semibold uppercase tracking-wider mb-2" style="color:rgba(255,255,255,0.45);">Your Name (Optional)</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-4" style="color:rgba(255,255,255,0.35);">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                            </span>
                            <input type="text" id="name" placeholder="e.g. John Doe (Optional)" class="glass-input rounded-xl pl-12 pr-4 py-3.5 text-sm font-medium"/>
                        </div>
                    </div>
                    <div>
                        <label for="phone" class="block text-xs font-semibold uppercase tracking-wider mb-2" style="color:rgba(255,255,255,0.45);">WhatsApp Number (Optional)</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-0 flex items-center pl-4" style="color:rgba(255,255,255,0.35);">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.94.725l.548 2.2a1 1 0 01-.321.988l-1.305.98a10.582 10.582 0 004.872 4.872l.98-1.305a1 1 0 01.988-.321l2.2.548a1 1 0 01.725.94V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                            </span>
                            <input type="tel" id="phone" placeholder="e.g. +1 234 567 890 (Optional)" class="glass-input rounded-xl pl-12 pr-4 py-3.5 text-sm font-medium"/>
                        </div>
                    </div>
                    <input type="hidden" id="service-type" value="General Inquiry"/>
                    <button type="submit" id="submit-btn" class="w-full font-bold py-4 rounded-xl text-white text-sm tracking-wide" style="background:linear-gradient(135deg,#6366f1,#a855f7,#ec4899);box-shadow:0 4px 24px rgba(99,102,241,0.35),inset 0 1px 0 rgba(255,255,255,0.25);transition:opacity 0.2s;">
                        Join Shop Queue
                    </button>
                    <div class="relative flex py-2 items-center">
                        <div class="flex-grow border-t border-white/5"></div>
                        <span class="flex-shrink mx-4 text-[10px] text-slate-500 uppercase font-bold tracking-widest">Or</span>
                        <div class="flex-grow border-t border-white/5"></div>
                    </div>
                    <button type="button" id="anonymous-btn" class="w-full font-semibold py-3.5 rounded-xl text-slate-300 text-xs border border-white/10 hover:bg-white/5 hover:text-white transition-all cursor-pointer">
                        Get Token Only (Anonymous)
                    </button>
                </form>
            </div>

            <div id="error-container" class="hidden text-center py-6">
                <div class="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4" style="background:rgba(251,113,133,0.1);border:1px solid rgba(251,113,133,0.25);">
                    <svg class="w-6 h-6" style="color:#fb7185;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <h3 class="font-bold text-lg mb-1">Shop Connection Failed</h3>
                <p id="error-message" class="text-xs" style="color:rgba(255,255,255,0.5);">The shop ID does not exist or the backend is offline.</p>
                <a href="index.html" class="inline-block mt-6 text-sm font-semibold" style="color:#818cf8;">Back to Landing Page</a>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center z-10 relative" style="border-top:1px solid rgba(255,255,255,0.06);color:rgba(255,255,255,0.25);font-size:0.75rem;">
        <p>&copy; 2026 SmartQueue. All rights reserved.</p>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/app.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const shopId = urlParams.get("id");



        const loader = document.getElementById("shop-loader");
        const formContainer = document.getElementById("form-container");
        const errorContainer = document.getElementById("error-container");
        const errorMsg = document.getElementById("error-message");
        const shopTitle = document.getElementById("shop-name-title");

        if (!shopId) {
            loader.classList.add("hidden");
            errorContainer.classList.remove("hidden");
            errorMsg.innerText = "No Shop ID was provided. Please scan a valid shop QR code.";
        } else { loadShopDetails(); }

        async function loadShopDetails() {
            try {
                const response = await fetch(CONFIG.API_BASE_URL + "/shop/" + shopId);
                const data = await response.json();
                if (!response.ok) throw new Error(data.message || "Could not connect to shop");
                shopTitle.innerText = data.shop_name;
                
                // Show Shop profile image if available
                const avatarImg = document.getElementById("shop-avatar-img");
                const avatarPlaceholder = document.getElementById("shop-avatar-placeholder");
                if (data.profile_photo) {
                    if (avatarImg) {
                        avatarImg.src = data.profile_photo;
                        avatarImg.classList.remove("hidden");
                    }
                    if (avatarPlaceholder) avatarPlaceholder.classList.add("hidden");
                } else {
                    if (avatarImg) avatarImg.classList.add("hidden");
                    if (avatarPlaceholder) {
                        avatarPlaceholder.innerText = data.shop_name.charAt(0).toUpperCase();
                        avatarPlaceholder.classList.remove("hidden");
                    }
                }
                
                // Check if shop is open
                if (data.is_open === false) {
                    loader.classList.add("hidden");
                    formContainer.classList.add("hidden");
                    errorContainer.classList.remove("hidden");
                    errorMsg.innerText = "This shop is currently closed and not accepting queue tokens. Please check back later.";
                    const errorTitle = errorContainer.querySelector("h3");
                    if (errorTitle) errorTitle.innerText = "Shop is Closed";
                    return;
                }
                
                loader.classList.add("hidden");
                formContainer.classList.remove("hidden");
            } catch (err) {
                console.error(err);
                loader.classList.add("hidden");
                errorContainer.classList.remove("hidden");
                errorMsg.innerText = err.message || "Connection failed. The API may be offline.";
            }
        }

        const joinForm = document.getElementById("join-queue-form");
        const submitBtn = document.getElementById("submit-btn");
        const anonymousBtn = document.getElementById("anonymous-btn");

        if (anonymousBtn) {
            anonymousBtn.addEventListener("click", () => {
                document.getElementById("name").value = "";
                document.getElementById("phone").value = "";
                // Submit form directly
                submitQueueForm();
            });
        }

        joinForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            submitQueueForm();
        });

        async function submitQueueForm() {
            const name = document.getElementById("name").value.trim();
            const phone = document.getElementById("phone").value.trim();
            const serviceType = document.getElementById("service-type").value;
            
            submitBtn.disabled = true;
            submitBtn.innerHTML = "<svg class='animate-spin -ml-1 mr-3 h-5 w-5 text-white inline-block' fill='none' viewBox='0 0 24 24'><circle class='opacity-25' cx='12' cy='12' r='10' stroke='currentColor' stroke-width='4'></circle><path class='opacity-75' fill='currentColor' d='M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z'></path></svg>Joining Queue...";
            
            if (anonymousBtn) anonymousBtn.disabled = true;
            
            try {
                const response = await fetch(CONFIG.API_BASE_URL + "/shop/" + shopId + "/join", {
                    method: "POST",
                    headers: {"Content-Type":"application/json"},
                    body: JSON.stringify({
                        name: name || "Anonymous",
                        phone: phone || "N/A",
                        service_type: serviceType,
                        timezone_offset: new Date().getTimezoneOffset()
                    })
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.message || "Failed to join queue");
                Toast.show("Queue ticket generated! Loading ticket...", "success");
                setTimeout(() => { window.location.href = "token.html?id=" + result.ticket.id; }, 1000);
            } catch (err) {
                Toast.show(err.message, "error");
                submitBtn.disabled = false;
                submitBtn.innerText = "Join Shop Queue";
                if (anonymousBtn) anonymousBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
